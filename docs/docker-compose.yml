services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: downloader-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/downloader
      - JWT_SECRET=local_development_secret_key_change_me_in_production
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-smtp.resend.com}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-465}
      - EMAIL_SERVER_SECURE=${EMAIL_SERVER_SECURE:-true}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-resend}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-your_api_key_here}
      - EMAIL_FROM=${EMAIL_FROM:-onboarding@resend.dev}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-your_admin_email@example.com}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - downloader-network

  db:
    image: postgres:15-alpine
    container_name: downloader-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=downloader
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d downloader"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - downloader-network

networks:
  downloader-network:
    driver: bridge

volumes:
  postgres_data:
